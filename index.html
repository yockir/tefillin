<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דיוק תפילין - גרסה חסינת שיער</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', Arial; overflow: hidden; text-align: center; }
        video { display: none; }
        canvas { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        #status { position: absolute; top: 20px; width: 100%; font-size: 32px; font-weight: bold; text-shadow: 2px 2px 8px #000; z-index: 10; }
        #settings-bar { position: absolute; top: 85px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10; background: rgba(0,0,0,0.6); padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .setting-item { display: flex; align-items: center; gap: 10px; font-size: 20px; cursor: pointer; color: #4af; }
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; }
        #accuracy-container { position: absolute; left: 30px; top: 200px; width: 60px; height: 250px; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        #bar-background { width: 20px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 10px; position: relative; overflow: hidden; border: 2px solid rgba(255,255,255,0.3); }
        #bar-fill { width: 100%; height: 0%; background: #0f0; position: absolute; bottom: 0; transition: height 0.1s; }
        #accuracy-label { margin-bottom: 10px; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 3px #000; }
    </style>
</head>
<body>

<div id="status">טוען...</div>
<div id="settings-bar">
    <label class="setting-item">
        <input type="checkbox" id="chabad-mode">
        <span>תפילין חב"ד (גדולים)</span>
    </label>
</div>

<div id="accuracy-container">
    <div id="accuracy-label">דיוק</div>
    <div id="bar-background"><div id="bar-fill"></div></div>
</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d', {willReadFrequently: true});
const statusDiv = document.getElementById('status');
const barFill = document.getElementById('bar-fill');
const chabadMode = document.getElementById('chabad-mode');

let smoothX = 0, smoothY = 0, smoothBox = 0;
const lerp = (start, end, amt) => start + (end - start) * amt;

function onResults(results) {
    canvasElement.width = videoElement.videoWidth;
    canvasElement.height = videoElement.videoHeight;
    const w = canvasElement.width, h = canvasElement.height;
    canvasCtx.drawImage(results.image, 0, 0, w, h);

    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];
        const nose = landmarks[168], top = landmarks[10], eyeL = landmarks[33], eyeR = landmarks[263];

        const isHeadStraight = Math.abs(Math.atan2(eyeR.y - eyeL.y, eyeR.x - eyeL.x) * 180 / Math.PI) < 15;

        const fHeight = (nose.y * h - top.y * h);
        const targetY = (top.y * h) - (fHeight * 1.45); 
        const targetX = nose.x * w;
        
        const baseBoxScale = chabadMode.checked ? 0.82 : 0.68;
        const targetBox = Math.min(fHeight * baseBoxScale, 105);

        smoothX = lerp(smoothX || targetX, targetX, 0.2);
        smoothY = lerp(smoothY || targetY, targetY, 0.2);
        smoothBox = lerp(smoothBox || targetBox, targetBox, 0.2);

        let finalScore = 0, isPlaced = false;
        
        try {
            const checkSize = Math.floor(smoothBox * 2);
            if (checkSize > 10) {
                const checkData = canvasCtx.getImageData(smoothX - smoothBox, smoothY - smoothBox, checkSize, checkSize).data;
                let darkPixels = 0, sumX = 0, sumY = 0;
                let veryDarkPixels = 0;

                for(let i=0; i < checkData.length; i += 4) {
                    const r = checkData[i], g = checkData[i+1], b = checkData[i+2];
                    const brightness = (r + g + b) / 3;
                    
                    // תפילין הם כמעט תמיד כהים יותר משיער (רף 75)
                    if(brightness < 75) {
                        veryDarkPixels++;
                    }
                    // רף כללי לכהות (110)
                    if(brightness < 110) {
                        darkPixels++;
                        const idx = i / 4;
                        sumX += idx % checkSize;
                        sumY += Math.floor(idx / checkSize);
                    }
                }

                if (darkPixels > 20) {
                    const avgX = sumX / darkPixels, avgY = sumY / darkPixels;
                    const distX = Math.abs(avgX - smoothBox) / smoothBox;
                    const distY = Math.abs(avgY - (smoothBox * 1.1)) / smoothBox;

                    // חישוב יחס "שחור עמוק" מול "סתם כהות"
                    // שיער כהה יהיה לרוב סביב 90-110, תפילין ירדו מתחת ל-60
                    const deepBlackRatio = veryDarkPixels / darkPixels;
                    
                    const centering = Math.max(0, 1 - (distX * 2.0 + distY * 1.5));
                    const coverage = Math.min(darkPixels / (checkData.length / 4) / 0.35, 1.0);
                    
                    // המד מושפע עכשיו מאוד מה"עומק" של השחור כדי להבדיל משיער
                    finalScore = (coverage * 0.2) + (centering * 0.4) + (deepBlackRatio * 0.4);
                    
                    // כדי לקבל ירוק: חייב להיות שחור עמוק (מעל 50% מהכתם הכהה)
                    if (deepBlackRatio > 0.5 && centering > 0.75 && isHeadStraight) isPlaced = true;
                }
            }
        } catch(e) {}

        barFill.style.height = (finalScore * 100) + "%";
        barFill.style.background = isPlaced ? "#0f0" : "#ffa500";

        let color = isPlaced ? "#0f0" : (isHeadStraight ? "#f44" : "#ff0");
        statusDiv.innerText = isPlaced ? "!בדיוק" : (isHeadStraight ? "נא לכוון למרכז" : "נא ליישר את הראש");
        statusDiv.style.color = color;

        canvasCtx.strokeStyle = color;
        canvasCtx.lineWidth = isPlaced ? 8 : 4;
        canvasCtx.strokeRect(smoothX - smoothBox, smoothY - smoothBox, smoothBox * 2, smoothBox * 2);
    }
}

const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
faceMesh.onResults(onResults);
const camera = new Camera(videoElement, {onFrame: async () => { await faceMesh.send({image: videoElement}); }, width: 1280, height: 720});
camera.start();
</script>
</body>
</html>
